<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouBike 即時站點</title>
    <link rel="icon" type="image/png" sizes="192x192" href="ubike.png">
    <link rel="apple-touch-icon" href="ubike.png">
    <link rel="manifest" href="manifest.json">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --primary-color: #ff9d00;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-dark: #2d3436;
            --success: #00b894;
            --warning: #fdcb6e;
            --danger: #d63031;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-dark);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        h1 {
            color: white;
            text-align: center;
            font-size: 2rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 25px;
        }

        .action-area {
            text-align: center;
            margin-bottom: 25px;
        }

        #refreshBtn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            width: 100%;
        }

        #refreshBtn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(0,0,0,0.3);
        }

        #status {
            text-align: center;
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.9rem;
            margin-bottom: 15px;
            min-height: 1.2em;
        }

        /* 這裡同步改為 stationList 的樣式 */
        #stationList {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 15px rgba(0,0,0,0.1);
            border-left: 8px solid var(--primary-color);
            animation: slideUp 0.5s ease forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .station-name {
            font-size: 1.25rem;
            font-weight: 800;
            margin-bottom: 15px;
        }

        .info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px;
            border-radius: 15px;
            background: #f8f9fa;
        }

        .label { font-size: 0.8rem; color: #636e72; }
        .count { font-size: 1.8rem; font-weight: 900; }

        .good .count { color: var(--success); }
        .warning .count { color: var(--warning); }
        .danger .count { color: var(--danger); }

        .footer {
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.8rem;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚲 YouBike 即時站點</h1>

        <div class="action-area">
            <button id="refreshBtn">🚲 現在有車嗎？(點我查詢)</button>
        </div>

        <div id="status">準備就緒，請按下按鈕開始查詢</div>
        
        <div id="stationList"></div>

        <div class="footer">
            最後更新：<span id="lastUpdate">--</span>
            <div id="version"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
